apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tally-ingress
  namespace: lurus-tally
spec:
  entryPoints:
    - websecure
  routes:
    # /webhooks is served unauthenticated by the Go backend (Shopify HMAC-verified).
    # Without it the path falls through to the tally-web catch-all below and the
    # Next.js auth middleware 307-redirects the webhook to /login, so Shopify never
    # reaches the HMAC check.
    - match: Host(`tally-stage.lurus.cn`) && (PathPrefix(`/api`) || PathPrefix(`/internal`) || PathPrefix(`/webhooks`))
      kind: Rule
      priority: 10
      services:
        - name: tally-backend
          port: 18200
    - match: Host(`tally-stage.lurus.cn`)
      kind: Rule
      priority: 1
      services:
        - name: tally-web
          port: 3000
  tls:
    secretName: lurus-cn-wildcard-tls
