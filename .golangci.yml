run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - goimports
    - unconvert
    - ineffassign
    - unused
  disable:
    - exhaustruct

issues:
  exclude-rules:
    # errcheck is relaxed in test files (e.g. deferred cleanup calls).
    - path: _test\.go
      linters:
        - errcheck
