apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # STAGE uses an isolated Zitadel instance at test-auth.lurus.cn so
  # staging traffic never authenticates against the production tenant.
  # base/configmap.yaml ships the PROD issuer (auth.lurus.cn).
  - patch: |-
      - op: replace
        path: /data/ZITADEL_DOMAIN
        value: test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-config
  # STAGE backend hard-requires the audience: config.go fail-fasts at boot when
  # ZITADEL_DOMAIN is set (it is, above) but ZITADEL_AUDIENCE is empty. base
  # configmap ships "" and base secret.yaml does NOT define it, so a clean
  # `apply -k` boots into the "ZITADEL_AUDIENCE is required" error — live only
  # works via a hand-injected tally-secrets key (drift; STAGE_RUNBOOK §2 2026-06-04).
  # Pin it here so GitOps is self-describing instead of relying on that drift.
  #   MUST_SET: replace <OIDC_CLIENT_ID> with Tally's real Zitadel/OIDC client id
  #   (must equal secret ZITADEL_CLIENT_ID) BEFORE apply/sync.
  #   Precedence: envFrom lists configMapRef then secretRef, so a
  #   tally-secrets.ZITADEL_AUDIENCE OVERRIDES this — keep the two consistent.
  #   Naming: the feat branch renames this env to OIDC_AUDIENCE; on main the
  #   backend still reads ZITADEL_AUDIENCE (config.go), so this patches that key.
  - patch: |-
      - op: replace
        path: /data/ZITADEL_AUDIENCE
        value: "<OIDC_CLIENT_ID>"  # MUST_SET before sync — see comment above
    target:
      kind: ConfigMap
      name: tally-config
  # STAGE web must sign users in against the STAGE issuer too, or the id_token's
  # `iss` won't match the backend's ZITADEL_DOMAIN (test-auth) → backend 401.
  - patch: |-
      - op: replace
        path: /data/ZITADEL_ISSUER
        value: https://test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-web-config
  # R6 STAGE fronts traffic with a node-level nginx (no in-cluster Traefik
  # IngressRoute), so services MUST expose stable NodePorts to match
  # /etc/nginx/sites-enabled/lurus-stage upstream (127.0.0.1:30820 / 30830).
  # base/service*.yaml uses ClusterIP which is correct for PROD (Traefik).
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30820
    target:
      kind: Service
      name: tally-backend
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30830
    target:
      kind: Service
      name: tally-web
images:
  # Bumped to main-e02788a: low-stock alert redefined as the learned reorder
  # point (zero-config ROP, reusing the replenish Forecast) instead of the dead
  # low_safe_qty join; contract is now per-product (also fixes the never-
  # populated warehouse_name). Both backend AND web bumped — the alert row shape
  # changed, so the web widgets (dashboard + todo) move together. No migration.
  # Prior: backend main-ba458ba (#15+#16 payments/FK/PAT/webhook); web da39944.
  - name: ghcr.io/hanmahong5-arch/lurus-tally-backend
    newTag: main-e02788a
  - name: ghcr.io/hanmahong5-arch/lurus-tally-web
    newTag: main-e02788a
