apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: Host(`tally.lurus.cn`) && (PathPrefix(`/api`) || PathPrefix(`/internal`))
      - op: replace
        path: /spec/routes/1/match
        value: Host(`tally.lurus.cn`)
    target:
      kind: IngressRoute
      name: tally-ingress
images:
  - name: ghcr.io/hanmahong5-arch/lurus-tally-backend
    newTag: main-placeholder
  - name: ghcr.io/hanmahong5-arch/lurus-tally-web
    newTag: main-placeholder
