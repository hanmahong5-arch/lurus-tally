services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tally-uat-pg
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tallysecret
      POSTGRES_DB: lurus
    volumes:
      - tally_uat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tally"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tally-uat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: tally-uat-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tally_uat_pgdata:
