apiVersion: v1
kind: ConfigMap
metadata:
  name: tally-config
  namespace: lurus-tally
data:
  PORT: "18200"
  LOG_LEVEL: "info"
  GIN_MODE: "release"
  KOVA_URL: ""
  MEMORUS_URL: "http://memorus.lurus-system.svc:8880"
  # Canonical Lurus identity issuer. Zitadel issues iss=identity.lurus.cn since
  # the 2026-05-21 cutover; auth.lurus.cn is now a 301 alias, so a backend that
  # derives its issuer/JWKS from auth.lurus.cn rejects every token (strict iss
  # mismatch) and its code-exchange loses Authorization across the 301. Must be
  # the bare host (issuer + JWKS are derived from it).
  ZITADEL_DOMAIN: "identity.lurus.cn"
  # Tally's own Zitadel client/project id = the expected JWT `aud` claim.
  # MUST equal secret ZITADEL_CLIENT_ID. The backend reads ZITADEL_AUDIENCE
  # (config.go); while ZITADEL_DOMAIN is set, an empty value makes Load()
  # fail-fast at boot. Set the real per-env value at deploy time.
  ZITADEL_AUDIENCE: ""
  SHUTDOWN_TIMEOUT: "5s"
  MIGRATE_ON_BOOT: "true"
  # AI assistant — routes LLM calls through lurus newapi (never upstream directly)
  NEWAPI_BASE_URL: "https://newapi.lurus.cn/v1"
  DEFAULT_AI_MODEL: "deepseek-v4-flash"
  AI_PLAN_TTL_SECONDS: "1800"
  # LLM observability — self-hosted Langfuse on R6 /data partition.
  # Set HOST + the 2 keys via Secret; missing any → tracer falls back to no-op.
  LANGFUSE_HOST: ""
  # Shopify webhook secret — set via Secret; empty → handler rejects every push.
  # SHOPIFY_WEBHOOK_SECRET lives in secret.yaml
