apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # STAGE uses an isolated OIDC provider instance at test-auth.lurus.cn so
  # staging traffic never authenticates against the production tenant.
  # base/configmap.yaml ships the PROD issuer (identity.lurus.cn since the
  # 2026-05-21 cutover). NOTE (operator): confirm test-auth.lurus.cn is still a
  # live, separate STAGE issuer; if it was folded into identity.lurus.cn, drop
  # these two issuer patches so STAGE inherits the canonical issuer from base.
  - patch: |-
      - op: replace
        path: /data/OIDC_ISSUER
        value: test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-config
  # STAGE web must sign users in against the STAGE issuer too, or the id_token's
  # `iss` won't match the backend's OIDC_ISSUER (test-auth) → backend 401.
  - patch: |-
      - op: replace
        path: /data/OIDC_ISSUER
        value: https://test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-web-config
  # R6 STAGE fronts traffic with a node-level nginx (no in-cluster Traefik
  # IngressRoute), so services MUST expose stable NodePorts to match
  # /etc/nginx/sites-enabled/lurus-stage upstream (127.0.0.1:30820 / 30830).
  # base/service*.yaml uses ClusterIP which is correct for PROD (Traefik).
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30820
    target:
      kind: Service
      name: tally-backend
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30830
    target:
      kind: Service
      name: tally-web
images:
  # Bumped to main-e02788a: low-stock alert redefined as the learned reorder
  # point (zero-config ROP, reusing the replenish Forecast) instead of the dead
  # low_safe_qty join; contract is now per-product (also fixes the never-
  # populated warehouse_name). Both backend AND web bumped — the alert row shape
  # changed, so the web widgets (dashboard + todo) move together. No migration.
  # Prior: backend main-ba458ba (#15+#16 payments/FK/PAT/webhook); web da39944.
  - name: ghcr.io/hanmahong5-arch/lurus-tally-backend
    newTag: main-e02788a
  - name: ghcr.io/hanmahong5-arch/lurus-tally-web
    newTag: main-e02788a
