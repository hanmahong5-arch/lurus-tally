# S0.D — Kill-switch monitor CronJob.
#
# Fires every Monday at 09:00 Beijing time (UTC 01:00).  Uses the same
# backend image as the tally-backend deployment; the binary /kill-switch-monitor
# is compiled from cmd/kill-switch-monitor/ and must be present in the image.
# NOTE: The Dockerfile must be updated to produce this second binary — see
# the follow-up section in internal/alert/README.md.
#
# Volume strategy (follow-up required):
#   assumptions.md is read from a hostPath mount at /repo. This is a placeholder
#   for the first 10-customer phase. Production alternative: a git-sync sidecar
#   or a ConfigMap generated by bin/assumption-snapshot.sh CI step. See README.
#
# Hard rule (lurus/CLAUDE.md R6 磁盘): this job is read-only and writes nothing
# to disk, so no emptyDir or PVC is needed beyond the hostPath /repo mount.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tally-killswitch
  namespace: lurus-tally
  labels:
    app.kubernetes.io/name: tally-killswitch
    app.kubernetes.io/part-of: tally
    app.kubernetes.io/component: monitor
spec:
  # Every Monday at 09:00 Beijing (UTC+8) = Monday 01:00 UTC.
  schedule: "0 1 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4  # keep ~1 month of Monday runs
  failedJobsHistoryLimit: 4
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800  # 7d — keep for the following Monday's review
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: killswitch
              # CI replaces the tag with the actual main-<sha7> on each push.
              image: ghcr.io/hanmahong5-arch/lurus-tally-backend:main-latest
              imagePullPolicy: Always
              command: ["/kill-switch-monitor"]
              env:
                - name: ASSUMPTIONS_FILE
                  value: /repo/_bmad-output/planning-artifacts/assumptions.md
                - name: FEISHU_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: FEISHU_WEBHOOK_URL
                      optional: true   # sender skips gracefully when absent
                - name: SMTP_HOST
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_HOST
                      optional: true
                - name: SMTP_PORT
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_PORT
                      optional: true
                - name: SMTP_USER
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_USER
                      optional: true
                - name: SMTP_PASS
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_PASS
                      optional: true
                - name: SMTP_FROM
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_FROM
                      optional: true
                - name: SMTP_TO
                  valueFrom:
                    secretKeyRef:
                      name: tally-killswitch-secrets
                      key: SMTP_TO
                      optional: true
              volumeMounts:
                - name: repo
                  mountPath: /repo
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: repo
              # FOLLOW-UP: replace with a git-sync sidecar or ConfigMap injection
              # once the first customer cohort begins and assumptions.md has live
              # data. hostPath is sufficient for the Sprint 0 manual-ops phase.
              hostPath:
                # Adjust to the actual checkout path on the R6 node.
                path: /data/repos/lurus-tally
                type: DirectoryOrCreate
