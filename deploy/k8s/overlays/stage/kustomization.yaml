apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # STAGE uses an isolated Zitadel instance at test-auth.lurus.cn so
  # staging traffic never authenticates against the production tenant.
  # base/configmap.yaml ships the PROD issuer (auth.lurus.cn).
  - patch: |-
      - op: replace
        path: /data/ZITADEL_DOMAIN
        value: test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-config
  # STAGE web must sign users in against the STAGE issuer too, or the id_token's
  # `iss` won't match the backend's ZITADEL_DOMAIN (test-auth) → backend 401.
  - patch: |-
      - op: replace
        path: /data/ZITADEL_ISSUER
        value: https://test-auth.lurus.cn
    target:
      kind: ConfigMap
      name: tally-web-config
  # R6 STAGE fronts traffic with a node-level nginx (no in-cluster Traefik
  # IngressRoute), so services MUST expose stable NodePorts to match
  # /etc/nginx/sites-enabled/lurus-stage upstream (127.0.0.1:30820 / 30830).
  # base/service*.yaml uses ClusterIP which is correct for PROD (Traefik).
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30820
    target:
      kind: Service
      name: tally-backend
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30830
    target:
      kind: Service
      name: tally-web
images:
  # Backend bumped to main-46b0a4d (Hardening Wave 2, PRs #10+#11): require
  # Idempotency-Key on the 5 high-risk write routes + drop vestigial PAT scopes
  # (migration 000052 runs on boot → head 52). PR #12 (test backfill) carries no
  # runtime change. Prior: main-5f127f5 (#9 startup bounds), main-da76ee4 (#8
  # request-timeout). Web stays on da39944 — no web change in this wave.
  - name: ghcr.io/hanmahong5-arch/lurus-tally-backend
    newTag: main-46b0a4d
  - name: ghcr.io/hanmahong5-arch/lurus-tally-web
    newTag: main-da39944
