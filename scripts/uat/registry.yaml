# UAT case ledger вҖ” single source for which endpoint is covered by which case.
#
# RULES:
# - Field order inside each case block is load-bearing (coverage.sh parses
#   positionally): id, title, script, last_result, last_run, ai_calls,
#   failed_endpoints, endpoints.
# - Endpoint strings must be VERBATIM lines from routes-deployed.txt.
# - last_result is the POST-AUDIT verdict, written by the tally-uat workflow
#   report phase вҖ” testers never set it themselves. Values:
#     pass    вҖ” every check green; all endpoints count.
#     partial вҖ” case ran to completion but kept deliberate RED checks on real
#               product bugs; endpoints count EXCEPT those in failed_endpoints.
#     fail    вҖ” execution/evidence unsound; nothing counts.
#     blocked вҖ” could not run (env); nothing counts.
# - "covered" means the deployed contract was observed and asserted вҖ” expected
#   401/4xx contracts (e.g. /me under PAT, webhook reject) count as covered.
